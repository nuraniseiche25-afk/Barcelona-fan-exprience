        <img src="assets/images/logo.barca.png" alt="Barcelona Logo">

<section class="audio-hero">

    <h1>AUDIO EXPERIENCE</h1>

    <p>
        Dengarkan atmosfer Camp Nou dari sudut pandang supporter FC Barcelona.
    </p>
</section>

<section class="audio-list">

    <h2 class="audio-title">Daftar Audio :</h2>

    <div class="audio-content anthem">
        <h2>🎵 FC Barcelona Anthem</h2>

        <audio controls>
            <source src="assets/audio/FC Barcelona Anthem.mpeg" type="audio/mpeg">
        </audio>
    </div>

    <div class="audio-content chant">
        <h2>📣 Supporters Chant</h2>

        <audio controls>
            <source src="assets/audio/Supporters Chant.mpeg" type="audio/mpeg">
        </audio>
    </div>

    <div class="audio-content goal">
        <h2>⚽ Goal Celebration</h2>

        <audio controls>
            <source src="assets/audio/Goal Celebration.mpeg" type="audio/mpeg">
        </audio>
    </div>

    <div class="audio-content atmosphere">
        <h2>🏟 Stadium Atmosphere</h2>

        <audio controls>
            <source src="assets/audio/Stadion Atmosphere.mpeg" type="audio/mpeg">
        </audio>
    </div>

</section>

</body>
</html>
